name: Daily Dermatology Journal Digest

on:
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 01:00（台灣時間 09:00）
  workflow_dispatch:      # 允許手動觸發

permissions:
  contents: write

jobs:
  fetch-and-summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Run fetch script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_articles.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "chore: daily journal digest $(date +'%Y-%m-%d')"
          git push
